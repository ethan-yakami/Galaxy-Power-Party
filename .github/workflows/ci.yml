name: CI

on:
  push:
    branches:
      - main
      - master
      - 'codex/**'
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Audit Docs
        run: npm run audit:docs

      - name: Audit Paths
        run: npm run audit:paths

      - name: Audit Encoding
        run: npm run audit:encoding

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Dependency Cruise
        run: npm run depcruise

      - name: Audit Boundaries
        run: npm run audit:boundaries

      - name: Check Protocol Artifacts
        run: npm run protocol:check

      - name: Run Node Test Suite
        run: npm run test:node

      - name: Run Client Test Suite
        run: npm run test:client
