name: Deploy Render

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Run Full Test Suite
        run: npm test

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: ${{ secrets.RENDER_DEPLOY_HOOK_URL != '' }}
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}

  notify_failure:
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: ${{ failure() && secrets.ALERT_WEBHOOK_URL != '' }}
    steps:
      - name: Send Failure Webhook
        run: |
          payload='{"event":"deploy_pipeline_failed","repo":"'${GITHUB_REPOSITORY}'","branch":"'${GITHUB_REF_NAME}'","runUrl":"https://github.com/'${GITHUB_REPOSITORY}'/actions/runs/'${GITHUB_RUN_ID}'"}'
          curl -fsS -X POST "$ALERT_WEBHOOK_URL" -H "Content-Type: application/json" -d "$payload"
        env:
          ALERT_WEBHOOK_URL: ${{ secrets.ALERT_WEBHOOK_URL }}
