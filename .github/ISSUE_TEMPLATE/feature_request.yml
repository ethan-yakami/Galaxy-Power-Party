name: Feature Request
description: 提交一个功能或工程改进建议
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: goal
    attributes:
      label: 目标
      description: 你想解决什么问题
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 方案
      description: 如果已有想法，请写在这里
  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 会影响哪些页面、模块、协议或文档
