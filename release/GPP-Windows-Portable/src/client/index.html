<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>银河战力党 - 启动页</title>
    <link rel="stylesheet" href="launcher.css?v=v_launcher_fix_20260416_v2" />
  </head>
  <body>
    <div class="launcherBg" aria-hidden="true">
      <div class="launcherGlow launcherGlowA"></div>
      <div class="launcherGlow launcherGlowB"></div>
    </div>

    <main class="launcherShell">
      <section class="launcherCard">
        <p class="launcherSub">GALAXY POWER PARTY</p>
        <h1>银河战力党</h1>
        <p class="launcherDesc">从这里进入战斗、回放和角色工坊。创建或加入房间后，会在当前页面直接打开战斗壳层。</p>

        <label for="nameInput">
          玩家名
          <input id="nameInput" maxlength="20" placeholder="输入你的名字" />
        </label>

        <div class="launcherPublicCard authCard">
          <div class="launcherPublicHead">
            <h3>账号</h3>
            <span id="authStatusText" class="launcherPublicHint">未登录</span>
          </div>
          <label for="authUsernameInput">
            用户名
            <input id="authUsernameInput" maxlength="24" placeholder="输入用户名（至少 3 位）" />
          </label>
          <label for="authPasswordInput">
            密码
            <input id="authPasswordInput" type="password" maxlength="64" placeholder="输入密码（至少 6 位）" />
          </label>
          <div class="launcherActions">
            <button id="authRegisterBtn" type="button" class="secondaryBtn">注册</button>
            <button id="authLoginBtn" type="button" class="secondaryBtn">登录</button>
            <button id="authLogoutBtn" type="button" class="secondaryBtn">退出</button>
          </div>
        </div>

        <div class="launcherActions">
          <button id="createBtn" class="primaryBtn" type="button">创建房间</button>
          <button id="aiBtn" type="button">与 AI 对战</button>
          <button id="replaysBtn" type="button">对局回放</button>
          <button id="workshopBtn" type="button">角色工坊</button>
        </div>

        <div class="launcherPublicCard">
          <div class="launcherPublicHead">
            <h3>公开房间</h3>
            <button id="refreshPublicRoomsBtn" type="button" class="secondaryBtn">刷新</button>
          </div>
          <label for="publicRoomSelect">
            可见房间
            <select id="publicRoomSelect" class="launcherSelect">
              <option value="">暂无可加入房间</option>
            </select>
          </label>
          <p id="publicRoomsHint" class="launcherPublicHint">正在加载公开房间...</p>
        </div>

        <label for="roomCodeInput">
          4 位房间号
          <input id="roomCodeInput" maxlength="4" placeholder="例如 1234" />
        </label>

        <div class="launcherActions">
          <button id="joinBtn" type="button">加入房间</button>
        </div>

        <p id="launcherMessage" class="launcherMessage">选择一个操作后，会直接进入对应页面。</p>
        <p id="launcherDiagnostics" class="launcherDiagnostics">frontend unknown | mode pending | critical pending | launcher pending | status booting</p>
      </section>
    </main>

    <script type="module" src="app/launcher-entry.js"></script>
  </body>
</html>
